<!doctype html> 
<html lang="en"> 
  <head> 
    <meta charset="UTF-8" /> 
    <link rel="icon" type="image/svg+xml" href="/k9-icon.svg" /> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0" /> 
    <meta name="description" content="K9 — Find opportunities before anyone else. Real-time signals, free airdrops, crypto jobs, and insider alerts delivered to your phone." /> 
    <meta name="keywords" content="crypto, airdrop, defi, polymarket, blockchain, jobs, signals, opportunities" /> 
    <meta name="author" content="K9" /> 
 
    <!-- Security headers --> 
    <meta http-equiv="X-Content-Type-Options" content="nosniff" /> 
    <meta http-equiv="X-Frame-Options" content="DENY" /> 
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" /> 
 
    <!-- Open Graph --> 
    <meta property="og:type" content="website" /> 
    <meta property="og:url" content="https://k9.app/" /> 
    <meta property="og:title" content="K9 — Find it before anyone else" /> 
    <meta property="og:description" content="Real-time crypto signals, free airdrops, jobs, and insider alerts. Delivered to your WhatsApp or Telegram." /> 
 
    <!-- Twitter --> 
    <meta property="twitter:card" content="summary_large_image" /> 
    <meta property="twitter:title" content="K9 — Find it before anyone else" /> 
    <meta property="twitter:description" content="Real-time crypto signals, free airdrops, jobs, and insider alerts." /> 
 
    <title>K9 — Find it before anyone else</title> 
 
  <style> 
    * { margin: 0; padding: 0; box-sizing: border-box; } 
    body { background: #07090D; color: #EEF2F7; font-family: system-ui, sans-serif; } 
    #root { min-height: 100vh; } 
    .k9-splash { 
      display: flex; flex-direction: column; 
      align-items: center; justify-content: center; 
      height: 100vh; gap: 10px; 
    } 
    .k9-splash-name { 
      font-size: 32px; font-weight: 800; letter-spacing: -1px; color: #EEF2F7; 
      margin-top: 8px; 
    } 
    .k9-splash-sub { 
      font-size: 13px; color: #8A9BB0; 
    } 
    .k9-dot { animation: blink 1.4s ease-in-out infinite; opacity: 0; } 
    .k9-dot:nth-child(2) { animation-delay: 0.2s; } 
    .k9-dot:nth-child(3) { animation-delay: 0.4s; } 
    @keyframes blink { 0%,100%{opacity:0} 50%{opacity:1} } 
    @keyframes k9-sniff { 
      0%,100% { transform: translateY(0) rotate(-2deg); } 
      50% { transform: translateY(-4px) rotate(2deg); } 
    } 
    .k9-splash svg { animation: k9-sniff 2s ease-in-out infinite; } 
  </style> 
</head>
<body>
  <div id="root"> 
    <div class="k9-splash"> 
      <!-- Inline SVG of the K9 dog logo --> 
      <svg width="72" height="72" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg"> 
        <defs> 
          <radialGradient id="s-body" cx="45%" cy="35%" r="60%"> 
            <stop offset="0%" stop-color="#D4A055"/> 
            <stop offset="60%" stop-color="#A8732A"/> 
            <stop offset="100%" stop-color="#6B4A18"/> 
          </radialGradient> 
          <radialGradient id="s-dark" cx="50%" cy="40%" r="55%"> 
            <stop offset="0%" stop-color="#3A2810"/> 
            <stop offset="100%" stop-color="#1A1008"/> 
          </radialGradient> 
          <radialGradient id="s-nose" cx="35%" cy="30%" r="60%"> 
            <stop offset="0%" stop-color="#5A4A3A"/> 
            <stop offset="100%" stop-color="#1A1008"/> 
          </radialGradient> 
          <radialGradient id="s-eye" cx="35%" cy="30%" r="70%"> 
            <stop offset="0%" stop-color="#8B5E2A"/> 
            <stop offset="70%" stop-color="#3A2010"/> 
            <stop offset="100%" stop-color="#0A0605"/> 
          </radialGradient> 
          <radialGradient id="s-collar" cx="50%" cy="50%" r="50%"> 
            <stop offset="0%" stop-color="#A78BFA"/> 
            <stop offset="100%" stop-color="#6D28D9"/> 
          </radialGradient> 
          <filter id="s-shadow" x="-20%" y="-20%" width="140%" height="140%"> 
            <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#00000066"/> 
          </filter> 
          <style> 
            @keyframes s-nose { 0%,100%{opacity:0.25} 50%{opacity:0.7} } 
            .s-nose-glow { animation: s-nose 1.8s ease-in-out infinite; } 
          </style> 
        </defs> 
        <g filter="url(#s-shadow)"> 
          <ellipse cx="26" cy="46" rx="10" ry="8" fill="url(#s-body)"/> 
          <ellipse cx="20" cy="50" rx="14" ry="7" fill="url(#s-body)"/> 
          <ellipse cx="20" cy="48" rx="10" ry="5" fill="url(#s-dark)" opacity="0.7"/> 
          <ellipse cx="36" cy="30" rx="16" ry="14" fill="url(#s-body)"/> 
          <ellipse cx="34" cy="22" rx="12" ry="8" fill="url(#s-dark)" opacity="0.85"/> 
          <ellipse cx="42" cy="33" rx="5" ry="4" fill="#D4A055" opacity="0.5"/> 
          <ellipse cx="48" cy="36" rx="9" ry="7" fill="url(#s-body)"/> 
          <ellipse cx="49" cy="39" rx="7" ry="4" fill="#C49045"/> 
          <line x1="52" y1="34" x2="55" y2="36" stroke="#8B6020" stroke-width="0.8" stroke-linecap="round"/> 
          <ellipse cx="55" cy="35" rx="4" ry="3" fill="url(#s-nose)"/> 
          <ellipse cx="53.5" cy="33.8" rx="1.2" ry="0.8" fill="#6A5A4A" opacity="0.7"/> 
          <ellipse cx="54" cy="35.5" rx="1.0" ry="0.6" fill="#0A0605"/> 
          <ellipse cx="56.5" cy="35.5" rx="1.0" ry="0.6" fill="#0A0605"/> 
          <circle class="s-nose-glow" cx="55" cy="35" r="5" fill="#8B5CF6" opacity="0.25"/> 
          <ellipse cx="42" cy="28" rx="4" ry="3.5" fill="url(#s-eye)"/> 
          <ellipse cx="40.8" cy="26.8" rx="1.2" ry="0.9" fill="white" opacity="0.85"/> 
          <path d="M38 24.5 C40 23.5 44 23 46 24" stroke="#6B4A18" stroke-width="1.2" stroke-linecap="round" fill="none"/> 
          <path d="M26 20 C25 14 29 10 32 12 C30 15 28 18 27 22 Z" fill="url(#s-dark)"/> 
          <path d="M34 18 C33 11 38 7 42 10 C39 13 37 17 36 22 Z" fill="url(#s-body)"/> 
          <path d="M36 19 C35 14 38 10 40 12 C38 15 37 18 36.5 21 Z" fill="#C8703A" opacity="0.6"/> 
          <path d="M24 43 Q36 46 46 41" stroke="url(#s-collar)" stroke-width="3" stroke-linecap="round" fill="none"/> 
          <rect x="32" y="40" width="7" height="5" rx="1.5" fill="url(#s-collar)" opacity="0.9"/> 
          <text x="35.5" y="44" text-anchor="middle" fill="white" font-size="3" font-weight="bold" font-family="monospace">K9</text> 
        </g> 
      </svg> 
      <div class="k9-splash-name">K9</div> 
      <div class="k9-splash-sub"> 
        Sniffing for opportunities<span class="k9-dot">.</span><span class="k9-dot">.</span><span class="k9-dot">.</span> 
      </div> 
    </div> 
  </div> 
    <script type="module" src="/src/main.tsx"></script> 
  </body> 
</html>
