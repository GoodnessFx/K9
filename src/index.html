<!doctype html> 
<html lang="en" class="dark"> 
  <head> 
    <meta charset="UTF-8" /> 
    <link rel="icon" type="image/svg+xml" href="/k9-icon.svg" /> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" /> 
    <meta name="description" content="K9 — AI-powered crypto intelligence. Find opportunities before anyone else." /> 
    <title>K9 — Intelligence Platform</title> 
 
    <style> 
      * { margin: 0; padding: 0; box-sizing: border-box; } 
      body { background: #1a1a1a; color: #ececec; font-family: system-ui, -apple-system, sans-serif; overflow: hidden; } 
      #root { min-height: 100vh; } 
      .k9-splash { 
        display: flex; flex-direction: column; 
        align-items: center; justify-content: center; 
        height: 100vh; background: #1a1a1a;
      } 
      .k9-logo-container {
        position: relative;
        margin-bottom: 24px;
      }
      .k9-name { 
        font-size: 24px; font-weight: 800; letter-spacing: 0.2em; color: #ececec; 
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        text-transform: uppercase;
      } 
      .k9-loader {
        width: 40px; height: 2px; background: rgba(255,255,255,0.1);
        margin-top: 16px; border-radius: 2px; overflow: hidden;
      }
      .k9-loader-bar {
        width: 40%; height: 100%; background: #3b82f6;
        animation: loading 1.5s infinite ease-in-out;
      }
      @keyframes loading {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(250%); }
      }
    </style> 
  </head>
  <body>
    <div id="root"> 
      <div class="k9-splash"> 
        <div class="k9-logo-container">
          <!-- Minimalist K9 Mark -->
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M4 4V20M4 12H12M20 4L12 12M12 12L20 20" stroke="#ececec" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="k9-name">K9</div> 
        <div class="k9-loader"><div class="k9-loader-bar"></div></div>
      </div> 
    </div> 
    <script type="module" src="/src/main.tsx"></script> 
  </body> 
</html>
