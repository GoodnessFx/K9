<!doctype html> 
 <html lang="en"> 
   <head> 
     <meta charset="UTF-8" /> 
     <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0" /> 
     <meta name="description" content="K9 sniffs out money-making opportunities and sends them to your phone before anyone else finds them." /> 
     <meta name="theme-color" content="#1a1a1a" /> 
     <meta name="mobile-web-app-capable" content="yes" /> 
     <meta name="apple-mobile-web-app-capable" content="yes" /> 
     <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" /> 
     <meta name="apple-mobile-web-app-title" content="K9" /> 
     <meta property="og:title" content="K9 — Find it before anyone else" /> 
     <meta property="og:description" content="Free airdrops, insider signals, crypto jobs, prediction markets. Delivered to your WhatsApp." /> 
     <meta property="og:type" content="website" /> 
     <title>K9 — Find it before anyone else</title> 
 
     <style> 
       *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; } 
 
       /* Load Inter + Syne — same fonts the app uses */ 
       @font-face { 
         font-family: 'Inter'; 
         src: url('https://fonts.gstatic.com/s/inter/v20/UcC73FwrK3iLTeHuS_nVMrMxCp50SjIa1ZL7.woff2') format('woff2'); 
         font-weight: 400; 
         font-display: swap; 
       } 
       @font-face { 
         font-family: 'Inter'; 
         src: url('https://fonts.gstatic.com/s/inter/v20/UcC73FwrK3iLTeHuS_nVMrMxCp50SjIa1pL7.woff2') format('woff2'); 
         font-weight: 500; 
         font-display: swap; 
       } 
       @font-face { 
         font-family: 'Syne'; 
         src: url('https://fonts.gstatic.com/s/syne/v22/8vIJ7w0mEglA7m7rgP_K7A.woff2') format('woff2'); 
         font-weight: 600; 
         font-display: swap; 
       } 
       @font-face { 
         font-family: 'Syne'; 
         src: url('https://fonts.gstatic.com/s/syne/v22/8vIN7w0mEglAjR33oigU8Q.woff2') format('woff2'); 
         font-weight: 700; 
         font-display: swap; 
       } 
       @font-face { 
         font-family: 'Syne'; 
         src: url('https://fonts.gstatic.com/s/syne/v22/8vIN7w0mEglAjR33oCwU8Q.woff2') format('woff2'); 
         font-weight: 800; 
         font-display: swap; 
       } 
 
       html, body { 
         height: 100%; 
         background: #1a1a1a; 
         color: #ececec; 
         -webkit-font-smoothing: antialiased; 
         -moz-osx-font-smoothing: grayscale; 
         overflow: hidden; 
       } 
 
       #root { min-height: 100vh; } 
 
       /* ── Splash ─────────────────────────────────────────── */ 
       .splash { 
         position: fixed; 
         inset: 0; 
         display: flex; 
         flex-direction: column; 
         align-items: center; 
         justify-content: center; 
         background: #1a1a1a; 
         gap: 0; 
         z-index: 9999; 
         transition: opacity 0.5s ease-out; 
       } 
 
       /* K9 — Syne, the same display font Claude uses */ 
       .splash-name { 
         font-family: 'Syne', -apple-system, BlinkMacSystemFont, sans-serif; 
         font-weight: 800; 
         font-size: clamp(96px, 18vw, 160px); 
         letter-spacing: -0.05em; 
         color: #ececec; 
         line-height: 0.9; 
         margin-bottom: 20px; 
         /* Subtle gradient so it has depth, not flat */ 
         background: linear-gradient(160deg, #ffffff 0%, #ececec 40%, #8a8a8a 100%); 
         -webkit-background-clip: text; 
         -webkit-text-fill-color: transparent; 
         background-clip: text; 
       } 
 
       /* Tagline — Inter, regular weight */ 
       .splash-tagline { 
         font-family: 'Inter', -apple-system, sans-serif; 
         font-weight: 400; 
         font-size: clamp(13px, 2vw, 15px); 
         color: #484848; 
         letter-spacing: 0.01em; 
         margin-bottom: 36px; 
         text-align: center; 
         padding: 0 32px; 
       } 
 
       /* Three pulsing dots */ 
       .splash-dots { 
         display: flex; 
         align-items: center; 
         gap: 7px; 
       } 
 
       .splash-dot { 
         width: 4px; 
         height: 4px; 
         border-radius: 50%; 
         background: #5b8cf5; 
         animation: pulse 1.4s ease-in-out infinite; 
       } 
 
       .splash-dot:nth-child(1) { animation-delay: 0s; } 
       .splash-dot:nth-child(2) { animation-delay: 0.18s; } 
       .splash-dot:nth-child(3) { animation-delay: 0.36s; } 
 
       @keyframes pulse { 
         0%, 100% { opacity: 0.2; transform: scale(0.8); } 
         50%       { opacity: 1;   transform: scale(1.3); } 
       } 
 
       /* Mono caption below dots */ 
       .splash-caption { 
         font-family: 'SFMono-Regular', Consolas, 'DM Mono', monospace; 
         font-size: 10px; 
         color: #333; 
         letter-spacing: 0.14em; 
         text-transform: uppercase; 
         margin-top: 12px; 
       } 
     </style> 
   </head> 
   <body> 
     <div id="root"></div> 
     <div id="splash-screen" class="splash"> 
       <div class="splash-name">K9</div> 
       <div class="splash-tagline">Sniffing out opportunities</div> 
       <div class="splash-dots"> 
         <div class="splash-dot"></div> 
         <div class="splash-dot"></div> 
         <div class="splash-dot"></div> 
       </div> 
       <div class="splash-caption">scanning 14+ sources</div> 
     </div> 
     <script type="module" src="/src/main.tsx"></script> 
   </body> 
 </html>
