<!doctype html> 
 <html lang="en"> 
   <head> 
     <meta charset="UTF-8" /> 
     <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0" /> 
     <meta name="description" content="K9 — The intelligence layer between you and your next life-changing opportunity. Real-time signals. Plain English. Straight to your phone." /> 
     <meta name="theme-color" content="#1a1a1a" /> 
     <meta name="mobile-web-app-capable" content="yes" /> 
     <meta name="apple-mobile-web-app-capable" content="yes" /> 
     <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" /> 
     <meta name="apple-mobile-web-app-title" content="K9" /> 
     <meta property="og:title" content="K9 — Find it before anyone else" /> 
     <meta property="og:description" content="The intelligence layer between you and your next life-changing opportunity." /> 
     <meta property="og:type" content="website" /> 
     <meta property="og:url" content="https://k9.app/" /> 
     <meta name="twitter:card" content="summary_large_image" /> 
     <meta name="twitter:title" content="K9 — Find it before anyone else" /> 
     <title>K9 — Find it before anyone else</title> 
 
     <style> 
       *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; } 
 
       body { 
         background: #1a1a1a; 
         color: #ececec; 
         font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif; 
         overflow-x: hidden; 
       } 
 
       #root { min-height: 100vh; } 
 
       .k9-splash { 
         display: flex; 
         flex-direction: column; 
         align-items: center; 
         justify-content: center; 
         height: 100vh; 
         gap: 0; 
         background: #1a1a1a; 
       } 
 
       .k9-splash-wordmark { 
         font-size: clamp(72px, 15vw, 120px); 
         font-weight: 800; 
         letter-spacing: -0.04em; 
         color: #ececec; 
         line-height: 1; 
         margin-bottom: 16px; 
         font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; 
       } 
 
       .k9-splash-tagline { 
         font-size: clamp(13px, 2.5vw, 15px); 
         color: #555; 
         letter-spacing: 0.02em; 
         margin-bottom: 28px; 
         text-align: center; 
         padding: 0 24px; 
       } 
 
       .k9-loader { 
         width: 32px; 
         height: 2px; 
         background: rgba(255,255,255,0.08); 
         border-radius: 2px; 
         overflow: hidden; 
       } 
 
       .k9-loader-bar { 
         height: 100%; 
         width: 45%; 
         background: #5b8cf5; 
         border-radius: 2px; 
         animation: k9load 1.4s ease-in-out infinite; 
       } 
 
       @keyframes k9load { 
         0%   { transform: translateX(-100%); } 
         100% { transform: translateX(320%); } 
       } 
     </style> 
   </head> 
   <body> 
     <div id="root"> 
       <div class="k9-splash"> 
         <div class="k9-splash-wordmark">K9</div> 
         <div class="k9-splash-tagline">The intelligence layer between you and your next opportunity</div> 
         <div class="k9-loader"><div class="k9-loader-bar"></div></div> 
       </div> 
     </div> 
     <script type="module" src="/src/main.tsx"></script> 
   </body> 
 </html>
